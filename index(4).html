<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>躺平投资组合追踪器</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d28;
    --card-hover: #22263a;
    --border: #2a2e3e;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent-us: #6366f1;
    --accent-hk: #f59e0b;
    --accent-a: #ef4444;
    --green: #22c55e;
    --red: #ef4444;
    --green-bg: rgba(34,197,94,0.1);
    --red-bg: rgba(239,68,68,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    text-align: center;
    padding: 30px 0 10px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #f59e0b, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .status-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin: 16px 0 24px;
    flex-wrap: wrap;
  }
  .status-bar .time {
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .status-bar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .status-bar .dot.loading {
    background: var(--accent-us);
  }
  .status-bar .dot.error {
    background: var(--red);
    animation: none;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.4; }
  }
  .btn-refresh {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: var(--accent-us);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .btn-refresh:hover {
    background: rgba(99,102,241,0.25);
  }
  .btn-refresh:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .portfolios {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 24px;
  }
  .portfolio {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .portfolio:hover {
    transform: translateY(-2px);
  }
  .portfolio-header {
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .portfolio-header .label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .portfolio-header .flag {
    font-size: 1.5rem;
  }
  .portfolio-header .name {
    font-size: 1.1rem;
    font-weight: 600;
  }
  .portfolio-header .market-tag {
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
  }
  .us .market-tag { background: rgba(99,102,241,0.15); color: var(--accent-us); }
  .hk .market-tag { background: rgba(245,158,11,0.15); color: var(--accent-hk); }
  .a .market-tag { background: rgba(239,68,68,0.15); color: var(--accent-a); }

  .portfolio-summary {
    padding: 16px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .summary-item {
    padding: 12px;
    border-radius: 10px;
    text-align: center;
  }
  .summary-item .summary-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .summary-item .summary-value {
    font-size: 1.4rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .summary-item.positive { background: var(--green-bg); }
  .summary-item.positive .summary-value { color: var(--green); }
  .summary-item.negative { background: var(--red-bg); }
  .summary-item.negative .summary-value { color: var(--red); }
  .summary-item.neutral { background: rgba(136,146,168,0.1); }
  .summary-item.neutral .summary-value { color: var(--text-dim); }

  .holdings {
    padding: 8px 12px 16px;
  }
  .holding {
    display: grid;
    grid-template-columns: 44px 1fr 80px 80px;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    transition: background 0.15s;
  }
  .holding:hover {
    background: var(--card-hover);
  }
  .holding .weight {
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 4px 0;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 500;
  }
  .holding .info .ticker {
    font-weight: 600;
    font-size: 0.9rem;
  }
  .holding .info .name-cn {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .holding .change {
    text-align: right;
    font-size: 0.85rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .positive-text { color: var(--green); }
  .negative-text { color: var(--red); }
  .neutral-text { color: var(--text-dim); }
  .change-header {
    display: grid;
    grid-template-columns: 44px 1fr 80px 80px;
    gap: 8px;
    padding: 6px 12px;
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .change-header span:nth-child(3),
  .change-header span:nth-child(4) { text-align: right; }

  .loading-skeleton {
    height: 20px;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .error-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .error-msg .retry-link {
    color: var(--accent-us);
    cursor: pointer;
    text-decoration: underline;
  }
  .footer {
    text-align: center;
    padding: 32px 0 16px;
    color: var(--text-dim);
    font-size: 0.75rem;
  }
  .footer a {
    color: var(--accent-us);
    text-decoration: none;
  }
  @media (max-width: 500px) {
    .portfolios {
      grid-template-columns: 1fr;
    }
    .header h1 { font-size: 1.5rem; }
    .holding {
      grid-template-columns: 36px 1fr 64px 64px;
      gap: 4px;
      padding: 8px;
    }
    .change-header {
      grid-template-columns: 36px 1fr 64px 64px;
      gap: 4px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h1>躺平投资组合追踪器</h1>
  <p class="subtitle">三市场 ETF 组合 · 实时行情</p>
</div>

<div class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span class="time" id="statusText">正在加载数据...</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refreshAll()">刷新</button>
</div>

<div class="portfolios" id="portfolios">
  <!-- US -->
  <div class="portfolio us" id="port-us">
    <div class="portfolio-header">
      <div class="label"><span class="flag">🇺🇸</span><span class="name">美股躺平组合</span></div>
      <span class="market-tag">US Market</span>
    </div>
    <div class="portfolio-summary" id="summary-us">
      <div class="summary-item neutral"><div class="summary-label">当日涨跌</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
      <div class="summary-item neutral"><div class="summary-label">年初至今</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
    </div>
    <div class="holdings">
      <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
      <div id="holdings-us"></div>
    </div>
  </div>
  <!-- HK -->
  <div class="portfolio hk" id="port-hk">
    <div class="portfolio-header">
      <div class="label"><span class="flag">🇭🇰</span><span class="name">港股躺平组合</span></div>
      <span class="market-tag">HK Market</span>
    </div>
    <div class="portfolio-summary" id="summary-hk">
      <div class="summary-item neutral"><div class="summary-label">当日涨跌</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
      <div class="summary-item neutral"><div class="summary-label">年初至今</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
    </div>
    <div class="holdings">
      <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
      <div id="holdings-hk"></div>
    </div>
  </div>
  <!-- A -->
  <div class="portfolio a" id="port-a">
    <div class="portfolio-header">
      <div class="label"><span class="flag">🇨🇳</span><span class="name">A股躺平组合</span></div>
      <span class="market-tag">CN Market</span>
    </div>
    <div class="portfolio-summary" id="summary-a">
      <div class="summary-item neutral"><div class="summary-label">当日涨跌</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
      <div class="summary-item neutral"><div class="summary-label">年初至今</div><div class="summary-value"><div class="loading-skeleton" style="width:80px;margin:0 auto"></div></div></div>
    </div>
    <div class="holdings">
      <div class="change-header"><span></span><span>持仓</span><span>当日</span><span>YTD</span></div>
      <div id="holdings-a"></div>
    </div>
  </div>
</div>

<div class="footer">
  数据来源: 腾讯财经 · 自动刷新间隔 30s · 仅供参考，不构成投资建议
</div>
<details style="max-width:1400px;margin:0 auto;padding:0 20px">
  <summary style="color:#555;font-size:12px;cursor:pointer">调试日志</summary>
  <pre id="dbg" style="background:#0a0a0f;color:#6a6;font-size:11px;padding:10px;border-radius:8px;max-height:300px;overflow:auto;white-space:pre-wrap"></pre>
</details>

<script>
// ============ 调试日志 ============
function dbg(msg) {
  const el = document.getElementById('dbg');
  if (el) { el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n'; el.scrollTop = el.scrollHeight; }
  console.log('[DBG]', msg);
}

// ============ 组合定义 ============
// 腾讯财经代码: A股 sh/sz + 代码, 港股 hk + 代码, 美股 us + 代码
const PORTFOLIOS = {
  us: {
    name: '美股躺平组合',
    holdings: [
      { code: 'usQQQ',  display: 'QQQ',    nameCn: '纳指100 ETF',      weight: 25 },
      { code: 'usSPY',  display: 'SPY',    nameCn: '标普500 ETF',       weight: 25 },
      { code: 'usRING', display: 'RING',   nameCn: '全球黄金矿股 ETF',  weight: 20 },
      { code: 'usCOPX', display: 'COPX',   nameCn: '全球铜矿股 ETF',    weight: 20 },
      { code: 'usBITB', display: 'BITB',   nameCn: '比特币 ETF',         weight: 10 },
    ]
  },
  hk: {
    name: '港股躺平组合',
    holdings: [
      { code: 'hk03455', display: '03455', nameCn: '纳指100 ETF',      weight: 25 },
      { code: 'hk03132', display: '03132', nameCn: '全球半导体 ETF',    weight: 20 },
      { code: 'hk03147', display: '03147', nameCn: '中国创业板 ETF',    weight: 20 },
      { code: 'hk03110', display: '03110', nameCn: '恒生高股息 ETF',    weight: 20 },
      { code: 'hk02840', display: '02840', nameCn: '黄金 ETF',          weight: 15 },
    ]
  },
  a: {
    name: 'A股躺平组合',
    holdings: [
      { code: 'sh513390', display: '513390', nameCn: '纳指100 ETF',    weight: 25 },
      { code: 'sz159652', display: '159652', nameCn: '有色50 ETF',     weight: 25 },
      { code: 'sh588200', display: '588200', nameCn: '科创芯片 ETF',   weight: 25 },
      { code: 'sh515880', display: '515880', nameCn: '通信 ETF',       weight: 15 },
      { code: 'sh518880', display: '518880', nameCn: '黄金 ETF',       weight: 10 },
    ]
  }
};

// ============ YTD 基准价（2025年最后交易日收盘价） ============
const YTD_BASE = {
  'usQQQ':    613.537, 'usSPY':    680.063, 'usRING':   73.64,
  'usCOPX':   71.78,   'usBITB':   47.44,
  'hk03455':  4809.267,'hk03132':  37.56,   'hk03147':  12.46,
  'hk03110':  30.12,   'hk02840':  3112.00,
  'sh513390': 2.107,   'sz159652': 1.674,   'sh588200': 2.342,
  'sh515880': 1.027,   'sh518880': 9.301,
};

// ============ 腾讯财经 JSONP (qt.gtimg.cn) ============
// QQ浏览器不会拦截自家CDN域名
let _jid = 0;
function qqJsonp(codes, timeout = 8000) {
  return new Promise((resolve, reject) => {
    const cb = `v_${++_jid}_${Date.now()}`;
    // 腾讯行情接口用全局变量而非回调函数，返回格式: v_xxx="data..."
    // 但支持 JSONP 回调: r_data_callback(...)
    // 最简方案：直接用 script 标签加载，解析全局变量
    const s = document.createElement('script');
    const cleanup = () => { s.remove(); };
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeout);
    s.onload = () => {
      clearTimeout(timer); cleanup();
      // 腾讯接口会创建全局变量 v_usQQQ="..." v_sh513390="..." 等
      const results = {};
      codes.forEach(c => {
        const val = window['v_' + c];
        if (val) results[c] = val;
      });
      resolve(results);
    };
    s.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('script error')); };
    s.src = `https://qt.gtimg.cn/q=${codes.join(',')}`;
    document.head.appendChild(s);
  });
}

// ============ 解析腾讯行情数据 ============
// A股: v_sh513390="1~名称~代码~当前价~昨收~今开~...~涨跌额[31]~涨跌幅[32]~..."
// 港股: v_hk03455="100~名称~代码~当前价~今开~昨收~...~涨跌额[31]~涨跌幅[32]~..."
// 美股: v_usQQQ="200~名称~代码~当前价~昨收~今开~...~涨跌额[31]~涨跌幅[32]~..."
function parseQuote(code, raw) {
  if (!raw || raw === '') return null;
  const parts = raw.split('~');
  dbg(`  ${code} 字段数=${parts.length}, [0]=${parts[0]}, [3]=${parts[3]}, [4]=${parts[4]}, [5]=${parts[5]}, [31]=${parts[31]}, [32]=${parts[32]}`);

  const price = parseFloat(parts[3]);
  if (!price || price <= 0) return null;

  // 涨跌幅: 优先取 parts[32]（腾讯官方计算的涨跌幅%）
  let dailyPct = parseFloat(parts[32]);

  // 如果 parts[32] 无效，自行用昨收计算
  if (isNaN(dailyPct)) {
    let prev;
    if (code.startsWith('hk')) {
      prev = parseFloat(parts[5]); // 港股昨收在[5]
    } else {
      prev = parseFloat(parts[4]); // A股和美股昨收在[4]
    }
    if (prev > 0) dailyPct = ((price - prev) / prev) * 100;
  }

  return { code, price, dailyPct: isNaN(dailyPct) ? null : dailyPct };
}

// ============ 数据缓存 ============
const CACHE = {
  us:  { rt: {}, ytd: {}, loaded: false },
  hk:  { rt: {}, ytd: {}, loaded: false },
  a:   { rt: {}, ytd: {}, loaded: false },
};

// ============ 加载单个组合 ============
async function loadPortfolio(key) {
  const port = PORTFOLIOS[key];
  const c = CACHE[key];
  if (!c.loaded) renderLoadingHoldings(key);

  try {
    const codes = port.holdings.map(h => h.code);
    dbg(`加载 ${key}: ${codes.join(',')}`);
    const rawMap = await qqJsonp(codes);

    port.holdings.forEach(h => {
      const raw = rawMap[h.code];
      if (raw) {
        const q = parseQuote(h.code, raw);
        if (q) {
          c.rt[h.code] = q;
          // YTD 用基准价计算
          const base = YTD_BASE[h.code];
          if (base > 0 && q.price > 0) {
            c.ytd[h.code] = ((q.price - base) / base) * 100;
          }
          dbg(`  ${h.code} ✓ price=${q.price} daily=${q.dailyPct.toFixed(2)}% ytd=${c.ytd[h.code]?.toFixed(2)}%`);
        } else {
          dbg(`  ${h.code} 解析失败`);
        }
      } else {
        dbg(`  ${h.code} 无数据`);
      }
    });
  } catch(e) {
    dbg(`${key} 加载失败: ${e.message}`);
  }

  renderHoldings(key, c.rt, c.ytd);
  renderSummary(key, c.rt, c.ytd);
  c.loaded = true;
}

// ============ UI ============
function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}
function pc(v) {
  if (v == null || isNaN(v)) return 'neutral-text';
  return v > 0.001 ? 'positive-text' : v < -0.001 ? 'negative-text' : 'neutral-text';
}
function sc(v) {
  if (v == null || isNaN(v)) return 'neutral';
  return v > 0.001 ? 'positive' : v < -0.001 ? 'negative' : 'neutral';
}

function renderHoldings(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  document.getElementById(`holdings-${key}`).innerHTML = port.holdings.map(h => {
    const q = rt[h.code] || {};
    const d = q.dailyPct, y = ytd[h.code];
    return `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change ${pc(d)}">${fmt(d)}</div>
      <div class="change ${pc(y)}">${fmt(y)}</div>
    </div>`;
  }).join('');
}

function renderSummary(key, rt, ytd) {
  const port = PORTFOLIOS[key];
  let dW=0, yW=0, dOk=false, yOk=false;
  port.holdings.forEach(h => {
    const w = h.weight/100, q = rt[h.code]||{}, y = ytd[h.code];
    if (q.dailyPct != null) { dW += q.dailyPct*w; dOk=true; }
    if (y != null) { yW += y*w; yOk=true; }
  });
  const dv = dOk?dW:null, yv = yOk?yW:null;
  document.getElementById(`summary-${key}`).innerHTML = `
    <div class="summary-item ${sc(dv)}"><div class="summary-label">当日涨跌</div><div class="summary-value">${fmt(dv)}</div></div>
    <div class="summary-item ${sc(yv)}"><div class="summary-label">年初至今</div><div class="summary-value">${fmt(yv)}</div></div>`;
}

function renderLoadingHoldings(key) {
  const port = PORTFOLIOS[key];
  document.getElementById(`holdings-${key}`).innerHTML = port.holdings.map(h =>
    `<div class="holding">
      <div class="weight">${h.weight}%</div>
      <div class="info"><div class="ticker">${h.display}</div><div class="name-cn">${h.nameCn}</div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
      <div class="change"><div class="loading-skeleton" style="width:50px;height:16px;margin-left:auto"></div></div>
    </div>`
  ).join('');
}

// ============ 状态 & 刷新 ============
function setStatus(s, m) {
  document.getElementById('statusDot').className = 'dot ' + (s==='ok'?'':s==='loading'?'loading':'error');
  document.getElementById('statusText').textContent = m;
}
let _timer = null, _first = true;
async function refreshAll() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  const t0 = performance.now();
  setStatus('loading', _first ? '正在获取数据...' : '刷新中...');
  try {
    await Promise.allSettled(['us','hk','a'].map(k => loadPortfolio(k)));
    _first = false;
    const ms = ((performance.now()-t0)/1000).toFixed(1);
    const now = new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    setStatus('ok', `最后更新: ${now} (${ms}s)`);
  } catch(e) {
    setStatus('error', '加载失败');
  }
  btn.disabled = false;
  clearTimeout(_timer);
  _timer = setTimeout(refreshAll, 30000);
}

// ============ 启动 ============
document.addEventListener('DOMContentLoaded', () => {
  ['us','hk','a'].forEach(k => renderLoadingHoldings(k));
  dbg('启动, 协议: ' + location.protocol + ', UA: ' + navigator.userAgent.substring(0, 60));
  refreshAll();
});
</script>

</body>
</html>
